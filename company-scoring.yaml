# Better Ventures — Company Scoring Rubric
# Used by: pitchbook-pipeline, BV-Acceleratorbot, affinity-sync
# Edit here to update scoring across all pipelines.

version: 1

# ─── SCORING SCALE ───────────────────────────────────────────────
# Same 1-10 scale used for all company evaluations.
scoring_scale:
  9-10: "Exceptional — top 5% of companies we see"
  7-8: "Strong — clear positive signal"
  5-6: "Average — meets baseline expectations"
  3-4: "Weak — below expectations"
  1-2: "Red flag — significant concern"

# ─── INVESTMENT THESIS ───────────────────────────────────────────
thesis: |
  Better Ventures backs startups leveraging science & technology to build the Better Economy,
  where people and the planet flourish.

core_business_test: |
  The thesis area MUST be the company's PRIMARY value proposition, not a side benefit or marketing angle.
  - "Funds tree planting with each subscription" = NOT a climate company (it's marketing)
  - "Hot meal delivery kiosks" = NOT food as medicine (it's convenience food)
  - "AI chatbot that plants trees" = NOT climate (tree planting is a feature, not the product)
  The CORE PRODUCT must directly address the thesis area to score 7+.

# ─── THEMES ──────────────────────────────────────────────────────
themes:
  climate:
    name: "Climate/Sustainability"
    description: |
      Reducing carbon emissions, waste, pollution. Electrification, Food & Ag, Bioeconomy, Circular Economy.
      The company's CORE PRODUCT must directly reduce emissions, waste, or pollution.
    keywords:
      - carbon
      - hydrogen
      - clean energy
      - renewable
      - electrification
      - EV
      - batteries
      - solar
      - wind
      - heat pumps
      - grid
      - carbon markets
      - recycling
      - water
      - climate tech
      - emissions
      - decarbonization
      - sustainable
      - circular economy
      - biodiversity
      - green chemistry
      - geospatial
      - GIS
      - environmental monitoring
      - satellite imagery
      - land use
      - infrastructure monitoring
      - sustainable materials
      - sustainable textiles
      - ocean technology
      - sustainable fisheries
      - aquaculture
      - regenerative agriculture
      - soil health
      - compostable
      - biodegradable
      - plant-based materials
      - carbon capture
      - energy efficiency
      - building efficiency
    exclusion_notes: |
      Fossil fuel/gas turbine powered solutions should NOT score 7+ on climate, even if "efficient".
      Donating to environmental causes or carbon offsets as a feature = NOT a climate company.

  health:
    name: "Health/Longevity"
    description: |
      Biological insights and digital tools for health and lower cost of care.
      Includes: healthcare infrastructure, healthcare planning, healthcare facilities, reduce cost of care.
    keywords:
      - metabolic health
      - nutrition
      - gut microbiome
      - prebiotics
      - longevity
      - food as medicine
      - personalized nutrition
      - GLP-1
      - wearables
      - health monitoring

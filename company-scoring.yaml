# Better Ventures — Company Scoring Rubric
# Used by: pitchbook-pipeline, BV-Acceleratorbot, affinity-sync
# Edit here to update scoring across all pipelines.

version: 2

# ─── SCORING SCALE ───────────────────────────────────────────────
scoring_scale:
  9-10: "Exceptional — top 5% of companies we see"
  7-8: "Strong — clear positive signal"
  5-6: "Average — meets baseline expectations"
  3-4: "Weak — below expectations"
  1-2: "Red flag — significant concern"

# ─── INVESTMENT THESIS ───────────────────────────────────────────
thesis: |
  Better Ventures backs startups leveraging science & technology to build the Better Economy,
  where people and the planet flourish.

core_business_test: |
  The thesis area MUST be the company's PRIMARY value proposition, not a side benefit.
  "Funds tree planting with each subscription" = NOT climate. "Meal delivery" = NOT food as medicine.
  The CORE PRODUCT must directly address the thesis area to score 5+.

# ─── THEMES ──────────────────────────────────────────────────────
themes:
  climate:
    name: "Climate/Sustainability"
    description: |
      Reducing carbon emissions, waste, and pollution across industries.
      Electrification, clean energy, Food & Ag, Bioeconomy, Circular Economy.
    keywords:
      - carbon
      - hydrogen
      - clean energy
      - renewable
      - electrification
      - EV
      - batteries
      - solar
      - wind
      - heat pumps
      - grid
      - carbon markets
      - recycling
      - water treatment
      - climate tech
      - emissions
      - decarbonization
      - sustainable
      - circular economy
      - green chemistry
      - environmental monitoring
      - sustainable materials
      - aquaculture
      - regenerative agriculture
      - soil health
      - carbon capture
      - energy efficiency
      - building efficiency
      - geospatial
      - satellite imagery
    notes: |
      Fossil fuel/gas turbine solutions should NOT score high, even if "efficient".
      Carbon offsets as a feature != climate company.

  health:
    name: "Health/Longevity"
    description: |
      Biological insights and digital tools to improve health and reduce cost of care.
      Biotech, digital health, medical devices, therapeutics, diagnostics,
      healthcare operations, and food as medicine.
    keywords:
      - metabolic health
      - nutrition
      - gut microbiome
      - longevity
      - food as medicine
      - GLP-1
      - wearables
      - health monitoring
      - healthcare
      - behavioral health
      - chronic disease
      - diagnostics
      - therapeutics
      - biotech
      - digital health
      - telehealth
      - medical devices
      - neurotechnology
      - surgical robotics
      - drug discovery
      - genomics
      - cell therapy
      - gene therapy
      - immunotherapy
      - healthcare infrastructure
      - reduce cost of care
      - clinical workflows
      - patient monitoring
    notes: |
      Food as Medicine YES: therapeutic diets, functional foods, nutrition science.
      Food as Medicine NO: generic meal delivery, meal kits, restaurant tech.

  workforce:
    name: "Opportunity/Workforce"
    description: |
      Building skills for the modern economy. Reskilling, upskilling, workforce
      augmentation, and AI tools that empower workers and small businesses.
    keywords:
      - reskilling
      - upskilling
      - workforce
      - education
      - personalized learning
      - frontline workforce
      - skilled trades
      - talent development
      - ai for smbs
      - small business tools
      - credentials
      - career pathways
      - vocational training
      - workforce augmentation
      - worker productivity
      - human capital
      - contractor tools
      - field service
    notes: |
      Be inclusive here. AI tools that genuinely help workers do their jobs better
      or help SMBs compete count. Don't limit to just "reskilling" programs.
      But generic enterprise SaaS (CRM, marketing automation) does NOT count.
      CRITICAL: The TARGET USER must be workers, job-seekers, students, tradespeople, or SMB owners.
      Enterprise automation tools that replace workers (not augment them) do NOT count.
      NOT workforce (score 1-3 on Opportunity):
      - Enterprise workflow automation (RPA, agentic AI for enterprises)
      - AI tools for financial institutions (lending, underwriting, compliance)
      - Logistics/supply chain optimization
      - Developer tools, DevOps, security tools
      - Legal tech, legal automation
      KEY TEST: Does this product primarily help individual workers or small business owners?
      If it primarily helps enterprises automate internal processes, score 1-3 on Opportunity.

# ─── EXCLUSIONS ──────────────────────────────────────────────────
exclusions: |
  These should score LOW (1-3) on ALL themes:
  - Pure financial services, insurance, wealth management, lending, underwriting
  - Entertainment, gaming, social media
  - Crypto/web3 without clear thesis alignment
  - Real estate services, legal services, legal tech
  - Generic logistics/supply chain (unless clear climate angle like emissions reduction)
  - Cybersecurity, developer tools, DevOps (unless clear workforce augmentation angle)
  IMPORTANT: A company in an excluded category should score low even if it uses AI.
  "AI for [excluded industry]" is still in the excluded industry.

# ─── ADDITIONAL SCORES ───────────────────────────────────────────
ai_score:
  range: [1, 3]
  3: "Central to value prop"
  2: "Used but not core"
  1: "Absent"

software_score:
  range: [1, 3]
  3: "Pure SaaS"
  2: "Software-enabled"
  1: "Not software"

# ─── FILTER THRESHOLD ───────────────────────────────────────────
# Companies scoring at or above this on any theme pass the filter
filter_threshold: 5

# ─── STEALTH COMPANY RULES ──────────────────────────────────────
stealth_rules: |
  If a company has no description but its name, keywords, or investors suggest
  thesis alignment, mark stealth=true for manual review.
  IMPORTANT: Company names containing thesis keywords (e.g., "biotech", "longevity",
  "solar", "health", "agri", "workforce", "climate", "energy") should ALWAYS be
  flagged stealth=true even with no other information. Err on the side of flagging.

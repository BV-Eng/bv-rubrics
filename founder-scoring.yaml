# Better Ventures — Founder Scoring Rubric
# Used by: pitchbook-pipeline, BV-Acceleratorbot, affinity-sync
# Edit here to update scoring across all pipelines.

version: 2

# ─── SCORING SCALE ───────────────────────────────────────────────
scoring_scale:
  9-10: "Exceptional — top 5% of founders we see"
  7-8: "Strong — clear positive signal"
  5-6: "Average — meets baseline expectations"
  3-4: "Weak — below expectations"
  1-2: "Red flag — significant concern"

# ─── SCORING PROMPT ──────────────────────────────────────────────
prompt: |
  You are evaluating startup founders for a venture capital firm.
  Give a single score from 1 to 10. Use the FULL range.

  What makes a great founder:
  - Built and shipped things before (previous startups, products, teams)
  - Deep expertise in their company's domain
  - Elite credentials (top schools, top companies, PhDs in relevant fields)
  - Authentic connection to the problem they're solving
  - Strong network and ability to attract talent/capital

  USE THE FULL 1-10 RANGE:
  - 9-10: Repeat founder with exits, or world-class expert building in their field.
          PhD from MIT + relevant domain + shipped products = 9.
  - 7-8:  Strong background. Good school + relevant experience + some execution evidence.
  - 5-6:  Decent but unremarkable. Standard background, first-time founder, limited signal.
  - 3-4:  Thin profile. No relevant domain experience, no execution evidence.
  - 1-2:  Red flags or essentially no background information.

  Most founders should NOT score 7+. A first-time founder from a non-elite
  school with no prior startup experience is a 4-5, not a 6-7.

  Be decisive. If the profile is sparse, that itself is a signal — score accordingly.

  Respond with EXACTLY two lines, nothing else:
  SCORE: [number 1-10]
  REASON: [one sentence]

# ─── RESPONSE FORMAT ─────────────────────────────────────────────
response_format: |
  Respond with EXACTLY two lines, nothing else:
  SCORE: [1-10]
  REASON: [One sentence explaining the key factors that drove the score]

  Do NOT include analysis, sub-scores, or commentary. Just the two lines above.
